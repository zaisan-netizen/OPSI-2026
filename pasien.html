<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pasien-perfusion-monitor</title>
<style>
.background {
/* SOLUSI: Menggunakan cover & cache busting agar background langsung rapi dan tidak gepeng */
background-image: url('background.jpg?v=1');
background-size: cover;
background-repeat: no-repeat;
background-position: center;
width: 100vw;
height: 100vh;
position: relative;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
padding: 20px;
box-sizing: border-box;
}

.tombol-kembali {
position: absolute;
top: 20px;
left: 50px;
background-color: #7f8c8d;
color: white;
border: none;
padding: 8px 16px;
border-radius: 4px;
cursor: pointer;
font-size: 14px;
font-weight: bold;
z-index: 10;
}

.tombol-kembali a {
color: white;
text-decoration: none;
}

.status-badge {
font-family: 'Arial', sans-serif;
width: 100%;
max-width: 380px; /* Otomatis mengecil proporsional di HP */
padding: 25px 0;
border-radius: 50px;
color: white;
font-size: 30px;
font-weight: bold;
border: none;
text-align: center;
box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.bg-warning { background-color: #f39c12; }
.bg-normal { background-color: #21bfa2; }
.bg-danger { background-color: #e74c3c; }

/* --- RESPONSIVITAS ELEMEN PADA LAYAR HP --- */
@media screen and (max-width: 1024px) {
.background {
height: auto !important;
min-height: 100vh;
padding: 40px 20px !important;
overflow-x: hidden;
}
div[style*="display: flex; gap: 20px"] {
flex-wrap: wrap !important;
}
div[style*="flex: 1;"] {
flex: 1 1 100% !important;
}
/* Memastikan badge status dan teks teks deviasi mengecil otomatis */
.status-badge {
width: 100% !important;
max-width: 350px !important;
font-size: 24px !important; /* Font badge mengecil di layar kecil agar teks tidak tumpah */
}
p {
width: 100% !important;
max-width: 350px !important;
font-size: 24px !important;
}
table {
display: block !important;
overflow-x: auto !important;
white-space: nowrap !important;
width: 100% !important;
}
/* Posisi tombol kembali menjadi fleksibel di atas saat di HP */
.tombol-kembali, .btn-keluar {
position: relative !important;
top: 0 !important;
left: 0 !important;
margin-top: 10px;
margin-bottom: 30px;
align-self: center;
}
}
</style>
</head>
<body>
<div class="background">
<button class="tombol-kembali" onclick="logout()">KEMBALI</button>
<h2 style="color: black; font-family: Arial; font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 20px;">ID ANDA: <span id="identitasRelawan">-</span></h2>
<button id="kotak-status" class="status-badge bg-warning">
Menentukan Baseline...
</button>
<!-- Mengubah width statis menjadi max-width agar responsif -->
<p style="color: black; font-family: Arial; margin-top: 20px; font-size: 30px; font-weight: bold; text-align: center; width: 100%; max-width: 380px;">
Deviasi: <span id="angkaDeviasi">0%</span>
</p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
databaseURL: "https://opsi-2026-30956-default-rtdb.asia-southeast1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
let kumpulanData = []; 
let nilaiBaseline = 0;
let Baselineditentukan = false;

const urlParams = new URLSearchParams(window.location.search);
let idRelawan = urlParams.get('id');
if (!idRelawan) {
idRelawan = "R01";
}
document.getElementById('identitasRelawan').innerText = idRelawan;

database.ref('relawan/' + idRelawan + '/amplitudo_sensor').on('value', (snapshot) => {
let dataMasuk = snapshot.val();
if (dataMasuk !== null && dataMasuk !== "") {
let amplitudoBaru = parseFloat(dataMasuk);
if (!isNaN(amplitudoBaru)) {
terimaDataESP(amplitudoBaru);
}
}
});

function terimaDataESP(amplitudoBaru) {
let elemenTombol = document.getElementById("kotak-status");
let elemenTeksDeviasi = document.getElementById("angkaDeviasi");
if (Baselineditentukan == false) {
kumpulanData.push(amplitudoBaru);
if (kumpulanData.length >= 5) { 
let total = 0;
for(let i = 0; i < kumpulanData.length; i++) {
total += kumpulanData[i];
}
nilaiBaseline = total / kumpulanData.length;
Baselineditentukan = true; 
elemenTombol.innerText = "STATUS: AMAN/NORMAL";
elemenTombol.className = "status-badge bg-normal";
}
} else {
let deviasi = Math.abs((nilaiBaseline - amplitudoBaru) / nilaiBaseline) * 100;
elemenTeksDeviasi.innerText = deviasi.toFixed(0) + "%";
if (deviasi > 10) {
elemenTombol.innerText = "BAHAYA (DEVIASI TINGGI)";
elemenTombol.className = "status-badge bg-danger";
} else {
elemenTombol.innerText = "STATUS: AMAN/NORMAL";
elemenTombol.className = "status-badge bg-normal";
}
}
}

function logout() {
window.location.href = "index.html";
}
</script>
</body>
</html>
