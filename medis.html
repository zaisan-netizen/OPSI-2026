<!DOCTYPE html>
<html>

<head>

<title>medis-dashboard-monitor</title>

<style>

.background {
background-image: url('background.jpg');
background-size: 100% 100%;
background-repeat: no-repeat;
background-position: center;
width: 100vw;
height: 100vh;
position: relative;
display: flex;
flex-direction: column;
}

.judul-halaman {
color: #2c3e50;
margin-bottom: 20px;
font-size: 28px;
font-weight: bold;
}

.tabel-pasien {
width: 100%;
border-collapse: collapse;
background-color: white;
box-shadow: 0 4px 10px rgba(0,0,0,0.05);
border-radius: 8px;
overflow: hidden;
}

.tabel-pasien th, .tabel-pasien td {
padding: 15px;
text-align: left;
border-bottom: 1px solid #eeeeee;
}

.tabel-pasien th {
background-color: #34495e;
color: white;
font-weight: bold;
}

.badge {
padding: 6px 12px;
border-radius: 20px;
color: white;
font-weight: bold;
font-size: 14px;
}

.badge-normal { background-color: #21bfa2; }
.badge-danger { background-color: #e74c3c; }

</style>

</head>

<body>

<div class="background">

<div class="judul-halaman">DASHBOARD PEMANTAUAN NAKES</div>

<table class="tabel-pasien">
<thead>
<tr>
<th>No Kamar</th>
<th>Nama Pasien</th>
<th>Amplitudo Sensor</th>
<th>Deviasi</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr>
<td>Kamar 101</td>
<td>Tn. Ahmad Kusuma</td>
<td id="nakesAmplitudo">Waiting...</td>
<td id="nakesDeviasi">0%</td>
<td><span id="nakesStatus" class="badge badge-normal">MENUNGGU DATA</span></td>
</tr>
</tbody>
</table>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
databaseURL: "https://opsi-2026-30956-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Di sini nanti kita akan hubungkan logika pembacaan baseline & deviasi yang sama persis
// Agar data di halaman pasien dan halaman nakes sinkron secara real-time!
</script>
</body>
</html>
